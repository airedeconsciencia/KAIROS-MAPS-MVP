<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kairos Maps — Identity Modulation Engine (7.5e DEV)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      background: #0f1115;
      color: #e5e7eb;
      line-height: 1.5;
      font-size: 13px;
    }
    .dev-banner {
      background: rgba(52, 211, 153, 0.1);
      border-bottom: 1px solid rgba(52, 211, 153, 0.35);
      color: #6ee7b7;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
    }
    .page { max-width: 960px; margin: 0 auto; padding: 20px 16px 48px; }
    h1 { margin: 0 0 4px; font-size: 18px; color: #6ee7b7; font-weight: 600; }
    .sub { color: #9ca3af; font-size: 12px; margin: 0 0 16px; max-width: 760px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
    select, button {
      font: inherit;
      cursor: pointer;
      background: #1f2937;
      border: 1px solid #374151;
      color: #e5e7eb;
      border-radius: 6px;
      padding: 8px 12px;
    }
    button.primary { background: rgba(52, 211, 153, 0.12); border-color: #6ee7b7; color: #a7f3d0; }
    .panel {
      background: #1a1d24;
      border: 1px solid #2a2f3a;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .panel-title {
      margin: 0 0 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
    }
    pre { margin: 0; white-space: pre-wrap; color: #d1d5db; font-size: 12px; }
  </style>
</head>
<body>
  <div class="dev-banner">DEV ONLY · 7.5e City Identity Mapping · 106 ciudades · modulation disabled</div>
  <div class="page">
    <h1>Identity Modulation Engine Lab</h1>
    <p class="sub">citySlug → archetype → dimensions → coefficients · sin aplicación editorial.</p>

    <div class="toolbar">
      <select id="city-select" aria-label="Ciudad"></select>
      <button type="button" class="primary" id="btn-show">Mostrar</button>
      <button type="button" id="btn-unknown">Ciudad desconocida</button>
    </div>

    <div class="panel">
      <div class="panel-title">City identity</div>
      <pre id="city-out">—</pre>
    </div>

    <div class="panel">
      <div class="panel-title">Archetype</div>
      <pre id="archetype-out">—</pre>
    </div>

    <div class="panel">
      <div class="panel-title">Dimensions</div>
      <pre id="dimensions-out">—</pre>
    </div>

    <div class="panel">
      <div class="panel-title">Modulation coefficients</div>
      <pre id="coefficients-out">—</pre>
    </div>

    <div class="panel">
      <div class="panel-title">Confidence / status / fallback</div>
      <pre id="status-out">—</pre>
    </div>

    <div class="panel">
      <div class="panel-title">Trace</div>
      <pre id="trace-out">—</pre>
    </div>
  </div>

  <script src="../content/identity-dimensions.js"></script>
  <script src="../content/city-identity-archetypes.js"></script>
  <script src="../content/identity-modulation-profile.js"></script>
  <script src="../content/city-identity-index.js"></script>
  <script src="../services/identity-modulation-service.js"></script>

  <script>
(function () {
  'use strict';

  var Index = window.KairosCityIdentityIndex;
  var Archetypes = window.KairosCityIdentityArchetypes;
  var Mod = window.KairosIdentityModulation;
  var select = document.getElementById('city-select');

  Index.listCityIdentities()
    .sort(function (a, b) { return a.catalogName.localeCompare(b.catalogName); })
    .forEach(function (entry) {
      var opt = document.createElement('option');
      opt.value = entry.citySlug;
      opt.textContent = entry.catalogName + ' · ' + entry.citySlug;
      select.appendChild(opt);
    });

  function renderCity(citySlug) {
    var resolved = Mod.resolveIdentity({ citySlug: citySlug });
    var profile = resolved.profile;
    var archetype = resolved.identityArchetype
      ? Archetypes.getArchetype(resolved.identityArchetype)
      : null;
    var trace = resolved.identityArchetype
      ? Mod.getModulationTrace(resolved.identityArchetype)
      : Mod.getModulationTrace(null);

    document.getElementById('city-out').textContent = JSON.stringify(
      profile.cityIdentity || { citySlug: citySlug, status: 'not_mapped' }, null, 2
    );

    document.getElementById('archetype-out').textContent = JSON.stringify({
      slug: resolved.identityArchetype,
      displayName: archetype && archetype.displayName,
      identity: profile.identity
    }, null, 2);

    document.getElementById('dimensions-out').textContent = JSON.stringify(profile.dimensions, null, 2);
    document.getElementById('coefficients-out').textContent = JSON.stringify(profile.modulation, null, 2);
    document.getElementById('status-out').textContent = JSON.stringify({
      confidence: profile.cityIdentity && profile.cityIdentity.confidence,
      status: profile.cityIdentity && profile.cityIdentity.status,
      neutralFallback: resolved.neutralFallback,
      found: resolved.found,
      reason: resolved.reason,
      modulationEnabled: profile.modulation.enabled
    }, null, 2);
    document.getElementById('trace-out').textContent = JSON.stringify(trace, null, 2);
  }

  document.getElementById('btn-show').addEventListener('click', function () {
    renderCity(select.value);
  });
  document.getElementById('btn-unknown').addEventListener('click', function () {
    renderCity('ciudad-inexistente-xx');
  });
  renderCity(select.value);
})();
  </script>
</body>
</html>
